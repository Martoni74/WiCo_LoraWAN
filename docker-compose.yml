version: "3"

services:
  chirpstack-network-server:
    image: chirpstack/chirpstack-network-server:3
    ports:
      - 9000:8000
    volumes:
      - ./configuration/chirpstack-network-server:/etc/chirpstack-network-server
    depends_on:
      - postgresql
      - redis

  chirpstack-application-server:
    image: chirpstack/chirpstack-application-server:3
    ports:
      - 8080:8080
    volumes:
      - ./configuration/chirpstack-application-server:/etc/chirpstack-application-server
    depends_on:
      - redis
      - postgresql

  chirpstack-gateway-bridge:
    image: chirpstack/chirpstack-gateway-bridge:3
    ports:
      - 1700:1700/udp
    volumes:
      - ./configuration/chirpstack-gateway-bridge:/etc/chirpstack-gateway-bridge
    depends_on:
      - redis
      - postgresql

  postgresql:
    image: postgres:9.6-alpine
    environment:
      - POSTGRES_PASSWORD=root
    volumes:
      - ./configuration/postgresql/initdb:/docker-entrypoint-initdb.d
      - postgresqldata:/var/lib/postgresql/data

  influxdb:
    image: influxdb:latest
    container_name: InfluxDB
    restart: always
    ports:
      - '8086:8086'
    volumes:
      - influxdb-storage:/var/lib/influxdb
    environment:
      - INFLUXDB_DB=iiot
      - INFLUXDB_ADMIN_USER=${INFLUXDB_USERNAME}
      - INFLUXDB_ADMIN_PASSWORD=${INFLUXDB_PASSWORD}

  redis:
    image: redis:5-alpine
    volumes:
      - redisdata:/data

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./configuration/eclipse-mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
    depends_on:
      - influxdb

  chronograf:
    image: chronograf:latest
    container_name: Chronograf
    restart: always
    ports:
      - '8888:8888'
    volumes:
      - chronograf-storage:/var/lib/chronograf
    depends_on:
      - influxdb
    environment:
      - INFLUXDB_URL=http://lorawan01.unil.ch:8086
      - INFLUXDB_USERNAME=${INFLUXDB_USERNAME}
      - INFLUXDB_PASSWORD=${INFLUXDB_PASSWORD}

  telegrafttn:
    image: telegraf:1.18-alpine
    volumes:
      - ./configuration/telegraf.conf:/etc/telegraf/telegraf.conf:ro
    depends_on:
      - chirpstack-network-server
    links:
      - influxdb
    ports:
      - '127.0.0.1:8125:8125/udp'

  grafana:
    image: grafana/grafana:latest
    container_name: Grafana
    restart: always
    ports:
      - '3000:3000'
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./grafana-provisioning/:/etc/grafana/provisioning
      - ./configuration/grafana/grafana.ini:/etc/grafana/grafana.ini
      - ./configuration/grafana/ldap.toml:/etc/grafana/ldap.toml
    depends_on:
      - influxdb
      - postgresql
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USERNAME}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_RENDERING_SERVER_URL=http://lorawan01.unil.ch:8081/render
      - GF_RENDERING_CALLBACK_URL=https://lorawan.unil.ch/
      - GF_LOG_FILTERS=rendering:debug
      - GF_FEATURE_TOGGLES_ENABLE=publicDashboards

  renderer:
    image: grafana/grafana-image-renderer:latest
    ports:
      - '8081:8081'

volumes:
  postgresqldata:
  redisdata:
  influxdb-storage:
  chronograf-storage:
  grafana-storage:
  influxdbv1-storage:
